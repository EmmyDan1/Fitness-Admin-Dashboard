<!doctype html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8" />  
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />  
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
    
    <!-- Basic Meta Tags -->  
    <title>FitSphere | Your Gateway to Fitness</title>  
    <meta name="description" content="Join FitSphere for personalized fitness plans, workout guides, and community support to achieve your health goals."/>  
    <meta name="keywords" content="fitness, workout, health, fitness plans, exercise, wellness" />  
    <meta name="author" content="Your Name / Your Company" />  
    
    <!-- Open Graph Tags for Social Media -->  
    <meta property="og:title" content="FitSphere" />  
    <meta property="og:description" content="Your Gateway to Fitness" />  
    <meta property="og:image" content="/path/to/image.jpg" /> <!-- Replace with the path to your image -->  
    <meta property="og:url" content="https://www.yoursite.com" />  
    <meta property="og:type" content="website" />  

    <!-- Twitter Card Tags -->  
    <meta name="twitter:card" content="summary_large_image" />  
    <meta name="twitter:title" content="FitSphere" />  
    <meta name="twitter:description" content="Join FitSphere for personalized fitness plans, workout guides, and community support to achieve your health goals." />  
    <meta name="twitter:image" content="/path/to/image.jpg" /> <!-- Replace with the path to your image -->  
    <meta name="twitter:url" content="https://www.yoursite.com" />  

    <!-- Structured Data (JSON-LD) for Search Engines -->  
    <script type="application/ld+json">  
    {  
        "@context": "https://schema.org",  
        "@type": "WebSite",  
        "name": "FitSphere",  
        "url": "https://www.yoursite.com",  
        "description": "Join FitSphere for personalized fitness plans, workout guides, and community support.",  
        "image": "/path/to/image.jpg"  
    }  
    </script>  

    <!-- CSS and other links -->  
    <link rel="stylesheet" href="/path/to/styles.css" /> <!-- Add your CSS file if any -->  
</head>  
<body>  
    <div id="root"></div>  
    <script type="module" src="/src/main.jsx"></script>  
</body>  
</html>
